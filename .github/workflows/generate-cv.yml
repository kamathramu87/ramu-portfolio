name: Generate CV PDF

on:
  push:
    branches:
      - main
    paths:
      - 'resume.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install resume-cli and theme
        run: |
          mkdir -p /tmp/resume-builder
          cd /tmp/resume-builder
          npm init -y
          npm install resume-cli jsonresume-theme-even

      - name: Export PDF
        run: |
          cp resume.json /tmp/resume-builder/resume.json
          cd /tmp/resume-builder
          ./node_modules/.bin/resume export resume.pdf --theme jsonresume-theme-even --format pdf
          cp resume.pdf $GITHUB_WORKSPACE/public/RamuKamath-CV.pdf

      - name: Commit updated PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/RamuKamath-CV.pdf
          git diff --staged --quiet || git commit -m "Auto-generate CV PDF from resume.json"
          git push
