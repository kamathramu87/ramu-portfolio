name: Generate CV PDF

on:
  push:
    branches:
      - main
    paths:
      - 'resume.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          mkdir -p /tmp/resume-builder
          cd /tmp/resume-builder
          npm init -y
          npm install jsonresume-theme-even puppeteer

      - name: Copy files
        run: |
          cp resume.json /tmp/resume-builder/resume.json
          cp scripts/generate-pdf.mjs /tmp/resume-builder/generate-pdf.mjs

      - name: Generate PDF
        run: node generate-pdf.mjs
        working-directory: /tmp/resume-builder

      - name: Commit updated PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/RamuKamath-CV.pdf
          git diff --staged --quiet || git commit -m "Auto-generate CV PDF from resume.json"
          git push
