name: Generate CV PDF

on:
  push:
    branches:
      - main
    paths:
      - 'resume.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install resume-cli and theme
        run: |
          npm install -g resume-cli
          npm install jsonresume-theme-even

      - name: Export PDF
        run: resume export public/RamuKamath-CV.pdf --theme jsonresume-theme-even --format pdf

      - name: Commit updated PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/RamuKamath-CV.pdf
          git diff --staged --quiet || git commit -m "Auto-generate CV PDF from resume.json"
          git push
